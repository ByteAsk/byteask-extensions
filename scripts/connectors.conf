# Registry of every connector in this monorepo, one line each:
#   <name> <dir> <tag_prefix> <version_reader>
#
# <version_reader> is a shell command (run with cwd = <dir>) that prints the
# connector's current version to stdout, nothing else. Add a new line here
# when a new connector (Zed, Emacs, Sublime, ...) lands -- this file is the
# single source of truth scripts/release.sh and scripts/release-status.sh
# both read, so tag-prefix/version-reading logic never has to be hand-typed
# or duplicated per connector again.

vscode    vscode-byteask   vscode-v    node -p "require('./package.json').version"
jetbrains jetbrains        jetbrains-v grep -m1 '^version' gradle.properties | cut -d= -f2 | tr -d ' '
zed       zed              zed-v       grep -m1 '^version' extension.toml | cut -d'"' -f2
emacs     emacs            emacs-v     grep -m1 '^;; Version:' byteask.el | sed 's/^;; Version: *//'
