name: Publish Zed Extension

# Triggered by pushing a tag like `zed-v0.1.0`, or manually.
# Builds the wasm32-wasip2 extension and attaches it to a GitHub Release.
#
# Zed extensions aren't distributed through a marketplace API -- they're
# submitted via a PR to zed-industries/extensions (fork + git submodule +
# extensions.toml entry). That submission is a separate, manual step (see
# zed/README.md); this workflow only guarantees every tagged version has a
# built artifact and a GitHub Release to submit from.

on:
  push:
    tags: ['zed-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zed
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - name: Build (wasm32-wasip2)
        run: cargo build --release --target wasm32-wasip2

      - name: Package extension
        run: |
          mkdir -p dist
          cp extension.toml dist/
          cp target/wasm32-wasip2/release/*.wasm dist/extension.wasm
          tar -czf byteask-zed.tar.gz -C dist .

      - name: Attach to GitHub Release
        if: always() && startsWith(github.ref, 'refs/tags/') && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          files: zed/byteask-zed.tar.gz
          fail_on_unmatched_files: true
