name: VS Code CI

on:
  push:
    branches: [main]
    paths: ['vscode-byteask/**', '.github/workflows/vscode-ci.yml']
  pull_request:
    paths: ['vscode-byteask/**', '.github/workflows/vscode-ci.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-byteask
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-byteask/package-lock.json

      - name: Install
        run: npm ci

      - name: Type-check / compile
        run: npm run compile

      - name: Validate packaging (.vsix builds)
        run: npx --yes @vscode/vsce package --no-dependencies -o /tmp/byteask-vscode.vsix
