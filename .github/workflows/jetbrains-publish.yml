name: Publish JetBrains Plugin

# Triggered by pushing a tag like `jetbrains-v0.1.0`, or manually.
# Builds the plugin zip once, publishes to the JetBrains Marketplace, and
# attaches the zip to a GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   PUBLISH_TOKEN, PRIVATE_KEY, PRIVATE_KEY_PASSWORD, CERTIFICATE_CHAIN
# The Marketplace publish step self-skips (not fails) if PUBLISH_TOKEN is
# absent, so a release can still be cut (GitHub Release only) before those
# secrets exist. NOTE: the very first version of this plugin on the
# Marketplace must be uploaded manually via the web UI (plugins.jetbrains.com)
# before `publishPlugin` can push subsequent versions — see jetbrains/README.md.

on:
  push:
    tags: ['jetbrains-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
      CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
      PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
    defaults:
      run:
        working-directory: jetbrains
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build plugin zip
        run: ./gradlew buildPlugin

      - name: Publish to JetBrains Marketplace
        if: ${{ env.PUBLISH_TOKEN != '' }}
        run: ./gradlew publishPlugin

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: jetbrains/build/distributions/*.zip
          fail_on_unmatched_files: true
