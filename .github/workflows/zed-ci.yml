name: Zed CI

on:
  push:
    branches: [main]
    paths: ['zed/**', '.github/workflows/zed-ci.yml']
  pull_request:
    paths: ['zed/**', '.github/workflows/zed-ci.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zed
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --target wasm32-wasip2 -- -D warnings

      - name: Build (wasm32-wasip2)
        run: cargo build --target wasm32-wasip2
