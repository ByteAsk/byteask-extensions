name: Publish VS Code Extension

# Triggered by pushing a tag like `vscode-v0.1.0`, or manually.
# Publishes to the VS Code Marketplace, Open VSX (Cursor/Windsurf/VSCodium),
# and attaches the .vsix to a GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   VSCE_PAT   — Azure DevOps PAT with Marketplace > Manage scope
#   OVSX_TOKEN — Open VSX access token
# Each publish step is skipped automatically if its secret is absent.

on:
  push:
    tags: ['vscode-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    defaults:
      run:
        working-directory: vscode-byteask
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-byteask/package-lock.json

      - name: Install
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package .vsix
        run: npx --yes @vscode/vsce package --no-dependencies -o byteask-vscode.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --packagePath byteask-vscode.vsix -p "$VSCE_PAT"

      - name: Publish to Open VSX
        # always() so a VS Code Marketplace failure (transient network error,
        # etc. -- verified live, this exact ECONNRESET happened on a real
        # release) doesn't also skip Open VSX; each destination is meant to
        # be independent, matching this step's own "already published" self-
        # skip below. Without always(), GitHub Actions skips every
        # subsequent step once any one step fails.
        if: always() && env.OVSX_TOKEN != '' && !cancelled()
        # "already published" happens on manual re-runs against an unchanged tag
        # (e.g. backfilling a later channel like the Marketplace) — not a failure.
        run: |
          set +e
          out=$(npx --yes ovsx publish byteask-vscode.vsix -p "$OVSX_TOKEN" 2>&1)
          code=$?
          echo "$out"
          if [ $code -ne 0 ] && echo "$out" | grep -q "is already published"; then
            echo "Open VSX: version already published, treating as success."
            exit 0
          fi
          exit $code

      - name: Attach .vsix to GitHub Release
        if: always() && startsWith(github.ref, 'refs/tags/') && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          files: vscode-byteask/byteask-vscode.vsix
          fail_on_unmatched_files: true
